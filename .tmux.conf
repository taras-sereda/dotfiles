# Notation
# C- (ctrl) - control key
# M- (alt) - meta key

# tmux modal plugin
#set -g @plugin 'whame/tmux-modal'

#set -g @modal-on-start on

# Set scrollback buffer to 100_000 lines
set -g history-limit 100000
# Display time on the right side of the status bar
set -g status-right '%H:%M %Z %d-%b-%y'
# Turn on clipboard integration
set -g set-clipboard on

# Use vim key-bindings in copy mode
set -g mode-keys vi
# frequently used key-bindings:
# space - start selection
# enter - copy selection and exit copy-mode
# vim style cursor navigation: hjkl

# Reload config file with prefix+r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Toggle synchronike-panes with prefix+e
bind e setw synchronize-panes
# Toggle mouse mode
bind m set -g mouse\; display "Mouse: #{?mouse, ON, OFF}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
